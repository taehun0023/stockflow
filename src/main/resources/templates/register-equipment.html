            <a href="/reservations-employee" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 font-medium transition-all hover:bg-slate-50 group">

            <a href="/reservations" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 font-medium transition-all hover:bg-slate-50 group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 group-hover:text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>

            <a href="/requests-employee" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 font-medium transition-all hover:bg-slate-50 group">

            </a>
            <a href="/employees" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 font-medium transition-all hover:bg-slate-50 group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 group-hover:text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                <span class="text-sm">利用者管理</span>
            </a>
            <a href="/settings" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-500 font-medium transition-all hover:bg-slate-50 group">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-slate-400 group-hover:text-slate-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>

        <div class="mt-auto border-t border-slate-100 p-4 shrink-0 bg-white z-20 relative">
            <div class="shrink-0 flex items-center justify-between">
                <a href="/profile" class="flex items-center gap-3 group hover:bg-slate-50/80 p-2 -ml-2 rounded-xl transition-colors flex-1 min-w-0">
                    <div class="h-9 w-9 rounded-full bg-slate-200 flex items-center justify-center text-[18px] font-black text-slate-500 shrink-0 shadow-inner group-hover:bg-slate-300 transition-colors" th:text="${user != null && user.name != null ? user.name.substring(0,1) : '山'}">山</div>
                    <div class="flex flex-col truncate">
                        <span class="text-[13px] font-bold text-slate-800 group-hover:text-sky-600 transition-colors truncate" th:text="${user != null ? user.name : '山田 太郎'}">山田 太郎</span>
                        <span class="text-[11px] text-slate-500 truncate transition-colors group-hover:text-slate-600" th:text="${user != null ? user.email : 'user@example.com'}">user@example.com</span>
                    </div>
                </a>
                <a href="/logout" class="p-2 text-slate-400 hover:text-slate-600 transition-colors rounded-lg hover:bg-slate-50 block"><svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"></path></svg></a>

        </aside>

    <!-- Main Content Area -->
    <div class="flex-1 lg:ml-64 min-w-0 flex flex-col min-h-screen">
        
        <header class="h-16 bg-white border-b border-slate-100 px-4 lg:px-8 flex items-center justify-between sticky top-0 z-40 shrink-0">
            <!-- Left: Toggle & Search -->
            <div class="flex items-center gap-3 flex-1">
                <button onclick="toggleSidebar()" class="lg:hidden shrink-0 flex items-center justify-center p-2 -ml-2 text-slate-600 hover:bg-slate-100 rounded-lg transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" /></svg>
                </button>
                <div class="hidden md:flex shrink-0 items-center gap-2 bg-slate-50/80 px-4 py-2 rounded-xl border border-transparent focus-within:bg-white focus-within:border-slate-300 focus-within:shadow-sm transition-all w-80">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                    <input type="text" placeholder="検索..." class="bg-transparent border-none outline-none text-[13px] w-full placeholder:text-slate-400 text-slate-900 font-medium">
                </div>
            </div>

            <!-- Right items -->
            <div class="shrink-0 flex items-center gap-3 sm:gap-4 ml-4">
                <div class="hidden sm:block text-right font-bold text-slate-900 tracking-tight text-[13px] font-mono" id="realtimeClock">2026-04-21 14:35</div>
                <div class="hidden sm:block h-8 w-px bg-slate-200 mx-2"></div>
                <button class="relative p-2 text-slate-400 hover:text-slate-600 hover:bg-slate-50 rounded-full transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" /></svg>
                    <span class="absolute top-2 right-2 w-2 h-2 bg-[#ea4335] rounded-full border border-white"></span>
                </button>
            </div>
        </header>
        
        <main class="p-4 lg:p-10 w-full max-w-[1400px] mx-auto flex-1">
            
            <div class="max-w-4xl mx-auto">
                <div class="mb-6 flex items-center gap-4">
                    <a href="/equipments" class="p-2 bg-white rounded-full border border-slate-200 text-slate-500 hover:text-slate-900 hover:bg-slate-50 transition-colors">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                    </a>
                    <h1 class="text-2xl font-black text-slate-900 tracking-tight">新規備品登録</h1>
                </div>

                <div class="glass-card rounded-[2rem] overflow-hidden bg-white/40 mb-10">
                    <form class="p-10 space-y-8" onsubmit="event.preventDefault(); window.location.href='/equipments';">
                        
                        <!-- AI Mode Toggle / Category logic simulation -->
                        <div class="p-6 bg-sky-50/50 rounded-2xl border border-sky-100 flex flex-col sm:flex-row items-center justify-between gap-4">
                            <div>
                                <h3 class="text-sm font-bold text-slate-900 mb-1">AI 登録アシスト</h3>
                                <p class="text-xs text-slate-500">モデル名を入力すると、AIがメーカー、型番、仕様情報を自動で取得・補完します。消耗品の場合はチェックを外してください。</p>
                            </div>
                            <label class="relative inline-flex items-center cursor-pointer shrink-0">
                                <input type="checkbox" id="aiToggle" class="sr-only peer" checked="" onchange="toggleFormFields()">
                                <div class="w-11 h-6 bg-slate-200 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-slate-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-sky-500"></div>
                                <span class="ml-3 text-sm font-bold text-slate-700">有効</span>
                            </label>
                        </div>

                        <!-- 1. Category & Location -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">カテゴリ <span class="text-red-500">*</span></label>
                                <select required="" class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-sky-500 focus:border-sky-500 p-3 outline-none transition-colors">
                                    <option value="" disabled="" selected="">選択してください</option>
                                    <option value="PC">PC</option>
                                    <option value="Monitor">モニター</option>
                                    <option value="License">ライセンス</option>
                                    <option value="Consumable">消耗品</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">保管場所 <span class="text-red-500">*</span></label>
                                <select required="" class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-sky-500 focus:border-sky-500 p-3 outline-none transition-colors">
                                    <option value="" disabled="" selected="">選択してください</option>
                                    <option value="L1">本社 IT倉庫</option>
                                    <option value="L2">東京支社</option>
                                    <option value="L3">3F 備品室</option>
                                </select>
                            </div>
                        </div>

                        <!-- 2. Naming & AI Fetching -->
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 items-end">
                            <div class="md:col-span-1">
                                <label class="block text-sm font-bold text-slate-700 mb-2">モデル名 <span id="modelRequiredAsterisk" class="text-red-500">*</span></label>
                                <input type="text" id="modelInput" placeholder="例: MacBook Pro 14インチ M3" required="" class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-sky-500 focus:border-sky-500 p-3 outline-none transition-colors">
                            </div>
                            <div class="md:col-span-1 flex gap-3">
                                <button type="button" id="aiButton" onclick="simulateAIFetch()" class="px-5 py-3 w-full bg-sky-100 text-sky-700 border border-sky-200 font-bold rounded-xl hover:bg-sky-200 transition-colors flex items-center justify-center gap-2">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19.428 15.428a2 2 0 00-1.022-.547l-2.387-.477a6 6 0 00-3.86.517l-.318.158a6 6 0 01-3.86.517L6.05 15.21a2 2 0 00-1.806.547M8 4h8l-1 1v5.172a2 2 0 00.586 1.414l5 5c1.26 1.26.367 3.414-1.415 3.414H4.828c-1.782 0-2.674-2.154-1.414-3.414l5-5A2 2 0 009 10.172V5L8 4z"></path></svg>
                                    AIで情報を取得・補完
                                </button>
                            </div>
                        </div>
                        
                        <div class="md:col-span-2">
                            <label class="block text-sm font-bold text-slate-700 mb-2">備品名 (表示用) <span class="text-red-500">*</span></label>
                            <input type="text" id="nameInput" placeholder="一覧に表示される名称" required="" class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-sky-500 focus:border-sky-500 p-3 outline-none transition-colors">
                        </div>

                        <!-- 3. Manufacturer / Model Number / Stock -->
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <div class="ai-managed-field">
                                <label class="block text-sm font-bold text-slate-700 mb-2">メーカー名 <span class="ai-req-asterisk text-red-500">*</span></label>
                                <input type="text" id="makerInput" placeholder="Apple, Dell など" required="" class="w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-sky-500 focus:border-sky-500 p-3 outline-none transition-colors">
                            </div>
                            <div class="ai-managed-field">
                                <label class="block text-sm font-bold text-slate-700 mb-2">型番 (Product No) <span class="ai-req-asterisk text-red-500">*</span></label>
                                <input type="text" id="modelNoInput" placeholder="MRX33J/A など" required="" class="w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-sky-500 focus:border-sky-500 p-3 outline-none transition-colors">
                            </div>
                            <div>
                                <label class="block text-sm font-bold text-slate-700 mb-2">初期在庫数量 <span class="text-red-500">*</span></label>
                                <input type="number" min="0" value="1" required="" class="w-full bg-white border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-sky-500 focus:border-sky-500 p-3 outline-none transition-colors">
                            </div>
                        </div>

                        <!-- 4. Specifications Textarea -->
                        <div class="ai-managed-field">
                            <label class="block text-sm font-bold text-slate-700 mb-2">仕様情報 / 製造年月</label>
                            <textarea id="specInput" rows="3" placeholder="AIによる補完、または手動で入力" class="w-full bg-slate-50 border border-slate-300 text-slate-900 text-sm rounded-xl focus:ring-sky-500 focus:border-sky-500 p-3 outline-none transition-colors"></textarea>
                        </div>

                        <!-- Actions -->
                        <div class="pt-6 border-t border-slate-200/50 flex items-center justify-between">
                            <p class="text-xs text-slate-500 font-medium">※ 管理番号(EQ-...)は自動採番されます<br>※ 登録後、状態は「利用可能」として在庫に反映されます</p>
                            <div class="flex gap-4">
                                <a href="/equipments" class="px-6 py-3 bg-white text-slate-700 font-bold rounded-xl hover:bg-slate-50 border border-slate-300 transition-colors shadow-sm">
                                    キャンセル
                                </a>
                                <button type="submit" class="px-8 py-3 bg-slate-900 text-white font-bold rounded-xl hover:bg-slate-800 focus:ring-4 focus:ring-slate-200 transition-all shadow-sm">
                                    登録を完了する
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        
        </main>
    </div>

    <script>
    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const backdrop = document.getElementById('sidebar-backdrop');
        if (sidebar.classList.contains('-translate-x-full')) {
            sidebar.classList.remove('-translate-x-full');
            backdrop.classList.remove('hidden');
            document.body.classList.add('overflow-hidden');
        } else {
            sidebar.classList.add('-translate-x-full');
            backdrop.classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        }
    }

    // Modal behavior fix for mobile
    function openDetailModal() {
        const modal = document.getElementById('detailModal');
        modal.classList.remove('hidden');
        document.body.classList.add('overflow-hidden');
    }
    
    function closeDetailModal() {
        const modal = document.getElementById('detailModal');
        modal.classList.add('hidden');
        document.body.classList.remove('overflow-hidden');
    }
    </script>
    <script src="/js/modals.js"></script>
</body>
</html>
