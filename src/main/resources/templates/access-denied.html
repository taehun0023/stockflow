<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>エンタープライズポータル - 権限エラー</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/dashboard.css">
</head>
<body class="bg-mesh min-h-screen font-sans flex items-center justify-center p-6">
    <section class="w-full max-w-lg bg-white rounded-2xl border border-slate-100 shadow-sm p-8 text-center">
        <div class="mx-auto h-14 w-14 rounded-2xl bg-rose-50 text-rose-600 flex items-center justify-center">

        </div>
        <h1 class="mt-5 text-xl font-black text-slate-900">アクセス権限がありません</h1>
        <p class="mt-2 text-sm font-bold text-slate-500">この操作または画面は現在の権限では利用できません。</p>
        <a href="/dashboard" class="mt-6 inline-flex rounded-xl bg-slate-900 px-5 py-3 text-sm font-black text-white hover:bg-slate-800">ダッシュボードへ戻る</a>
    </section>
    <script src="/js/modals.js"></script>

</html>
